<!DOCTYPE html>
<html>

<head>
    <title>Calendário</title>
    <link rel="stylesheet" href="assets/styles.css" />
</head>

<body>
    <header>
        <a href="dashboard.html">← Voltar</a>
    </header>

    <div id="content"></div>

    <script type="module">
        import { requireAuth } from "./assets/auth.js";
        import { api } from "./assets/api.js";
        import { sanitize } from "./assets/sanitize.js";

        requireAuth();

        const today = new Date().toISOString().split("T")[0];
        const data = await api(`/api/calendar/day?date=${today}`);

        document.getElementById("content").innerHTML =
            data.events.map(e => `<div>${sanitize(e.title)}</div>`).join("");
    </script>
</body>

</html>
