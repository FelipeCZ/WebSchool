<!DOCTYPE html>
<html>

<head>
    <title>Fotos</title>
    <link rel="stylesheet" href="assets/styles.css" />
</head>

<body>
    <header>
        <a href="dashboard.html">← Voltar</a>
    </header>

    <div id="content"></div>

    <script type="module">
        import { requireAuth } from "./assets/auth.js";
        import { api } from "./assets/api.js";
        import { sanitize } from "./assets/sanitize.js";

        requireAuth();

        const collections = await api("/api/photo/collections");

        let html = "";
        for (const c of collections) {
            html += `<h3>${sanitize(c.title)}</h3>`;
            const photos = await api(`/api/photo/collections/${c.id}/photos`);
            html += photos.items
                .map(p => `<img src="${p.thumbnailUrl}" />`)
                .join("");
        }

        content.innerHTML = html;
    </script>
</body>

</html>
